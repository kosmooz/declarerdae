name: declarerdae

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.db
    volumes:
      - declarerdae-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-declarerdae}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: declarerdae-api:latest
    container_name: declarerdae-api-new
    restart: unless-stopped
    env_file: ./api/.env
    volumes:
      - declarerdae-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - shared-proxy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: declarerdae-web:latest
    container_name: declarerdae-web-new
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      SITE_URL: https://declarerdefibrillateur.vitevu.com
      INTERNAL_API_URL: http://declarerdae-api-new:3001
    depends_on:
      - api
    networks:
      - backend
      - shared-proxy

volumes:
  declarerdae-pgdata:
  declarerdae-uploads:

networks:
  backend:
    driver: bridge
  shared-proxy:
    external: true
