name: declarerdae

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: declarerdae
      POSTGRES_PASSWORD: declarerdae_secret
      POSTGRES_DB: declarerdae
    volumes:
      - declarerdae-pgdata:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U declarerdae"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://declarerdae:declarerdae_secret@postgres:5432/declarerdae
      JWT_ACCESS_SECRET: 36mkHYSnIrm_reyKnaroeRIRv9kL7GUEgDJQ8Gl5AptTLzZVxC6atJgimK4Q25-e
      NODE_ENV: production
    volumes:
      - declarerdae-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3021:3001"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
    depends_on:
      - api
    ports:
      - "3020:3000"

  nginx:
    image: nginx:alpine
    ports:
      - "8083:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  declarerdae-pgdata:
  declarerdae-uploads:
